name = "template/roblox_quebec"
version = "0.1.0"
authors = ["c0balt60"]
license = "MIT"

[target]
environment = "roblox"
build_files = ["src"]

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
fusion = { wally = "elttob/fusion", version = "^0.2.0" }
charm = { wally = "littensy/charm", version = "^0.10.0" }
charm-sync = { wally = "littensy/charm-sync", version = "^0.3.0" }
react-charm = { wally = "littensy/react-charm", version = "^0.3.0" }
sift = { wally = "csqrl/sift", version = "^0.0.11" }
immut = { wally = "solarhorizon/immut", version = "^0.4.4" }
react = { wally = "haedrix/react", version = "^17.3.7" }
react_roblox = { wally = "haedrix/react-roblox", version = "^17.3.7" }
react_devtools_core = { wally = "haedrix/react-devtools-core", version = "^17.3.7" }
react_globals = { wally = "haedrix/react-globals", version = "^17.3.7" }
react_spring = { wally = "chriscerie/react-spring", version = "^2.0.0" }
promise = { wally = "lukadev-0/typed-promise", version = "^4.0.2" }
cmdr = { wally = "evaera/cmdr", version = "^1.12.0" }
janitor = { wally = "1foreverhd/janitor", version = "^1.18.15" }
profile-store = { wally = "vyon/profilestore", version = "^1.0.3" }
topbarplus = { name = "dancodesrbx/topbarplus", version = "^3.0.2" }
fastcast = { wally = "megamonsta2/fastcast", version = "^1.0.0" }
signal = { wally = "data-oriented-house/lemonsignal", version = "^1.11.0" }

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"
prepare = ".lune/prepare.luau"
sync = ".lune/sync.luau"
blinkgen = ".lune/blinkgen.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }
darklua = { name = "pesde/darklua", version = "^0.17.2", target = "lune" }
uilabs = { name = "pepeeltoro41/ui_labs", version = "^2.4.2" }

[overrides]
# React overrides
"react_reflex>React" = "react"
"react_spring>React" = "react"
"react_spring>ReactRoblox" = "react_roblox"
"react_is>React" = "react"
"react_error_boundary>React" = "react"
"react_error_boundary>ReactRoblox" = "react_roblox"
# roact_compat overrides
# "roact_compat>React" = "react"
# "roact_compat>react-roblox" = "react_roblox"
# "roact_compat>react-reconciler" = "react_reconciler"
# "roact_compat>scheduler" = "scheduler"
# "roact_compat>shared" = "shared"
# charm overrides
"charm>React" = "react"
"charm>ReactRoblox" = "react_roblox"
# charm_sync overrides
"charm_sync>React" = "react"
"charm_sync>ReactRoblox" = "react_roblox"
# ripple overrides
"ripple>React" = "react"
"ripple>ReactRoblox" = "react_roblox"

[engines]
pesde = "^0.7.0"
lune = "^0.10.4"

[patches]
"wally#haedrix/react" = { "17.3.7 roblox" = "patches/wally#haedrix+react-17.3.7+roblox_rc_deviations.patch" }
"wally#haedrix/scheduler" = { "17.3.7 roblox" = "patches/wally#haedrix+scheduler-17.3.7+roblox_error_bug.patch" }
# "wally#yetanotherclown/planck-runservice" = { "0.2.0 roblox" = "patches/wally#yetanotherclown+planck-runservice-0.2.0+roblox_server_performance_bug_hack.patch" }
# "wally#ukendio/jecs" = { "0.9.0 roblox" = "patches/wally#ukendio+jecs-0.9.0+roblox_latest_commit.patch" }
# "wally#pepeeltoro41/jecs-utils" = { "1.4.0 roblox" = "patches/wally#pepeeltoro41+jecs-utils-1.4.0+roblox.patch" }
"wally#haedrix/react-globals" = { "17.3.7 roblox" = "patches/wally#haedrix+react-globals-17.3.7+roblox_rc_react_globals.patch" }
"wally#chriscerie/react-spring" = { "2.0.0 roblox" = "patches/wally#chriscerie+react-spring-2.0.0+roblox_use_haedrix_shared_types.patch" }
# "wally#yetanotherclown/planck" = { "0.2.0 roblox" = "patches/wally#yetanotherclown+planck-0.2.0+roblox.patch" }
